name: ci

# Test/lint/build matrix (MISSION.md §3, §7; issue #13).
#
# Every source-touching step is guarded by a file-existence check (the
# fallback path lets this workflow stay a clean no-op on a docs-only tree),
# but the actual crate lives in src-tauri/, not the repo root — the cargo
# steps check for and run against src-tauri/Cargo.toml (issue #104).
#
# Trigger: plain `pull_request` — unlike harness-guard.yml / sentinel.yml,
# this workflow's whole job is to compile and test the PR's own code, so
# running the PR's copy of the workflow (and its code) is expected, not a
# harness-integrity risk. It needs no secrets and no elevated GITHUB_TOKEN
# scope (contents: read is enough), so there is nothing privileged for
# PR-controlled code to reach here.

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macos (test / lint / build)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check for Cargo.toml
        id: cargo
        run: echo "present=$(test -f src-tauri/Cargo.toml && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: cargo fmt --check
        if: steps.cargo.outputs.present == 'true'
        working-directory: src-tauri
        run: cargo fmt --all --check

      - name: cargo clippy
        if: steps.cargo.outputs.present == 'true'
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        if: steps.cargo.outputs.present == 'true'
        working-directory: src-tauri
        run: cargo test --all-features

      - name: Check for package.json
        id: pnpm
        run: echo "present=$(test -f package.json && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        if: steps.pnpm.outputs.present == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Setup pnpm
        if: steps.pnpm.outputs.present == 'true'
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0 (commit SHA — the tag object SHA is not resolvable by Actions)

      - name: pnpm install
        if: steps.pnpm.outputs.present == 'true'
        run: pnpm install --frozen-lockfile

      - name: pnpm lint
        if: steps.pnpm.outputs.present == 'true'
        run: pnpm lint

      - name: pnpm test
        if: steps.pnpm.outputs.present == 'true'
        run: pnpm test

      - name: pnpm build
        if: steps.pnpm.outputs.present == 'true'
        run: pnpm build

      - name: No manifests present — nothing to build yet
        if: steps.cargo.outputs.present == 'false' && steps.pnpm.outputs.present == 'false'
        run: echo "Docs-only tree — no Cargo.toml or package.json yet. Skipping build/test/lint."

  windows:
    name: windows (build / test)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check for Cargo.toml
        id: cargo
        shell: bash
        run: echo "present=$(test -f src-tauri/Cargo.toml && echo true || echo false)" >> "$GITHUB_OUTPUT"

      # whisper-rs-sys uses bindgen to generate bindings at build time, and
      # bindgen needs libclang (libclang.dll). The GitHub windows-latest image
      # already ships LLVM/Clang pre-installed at C:\Program Files\LLVM, so we
      # verify-then-fallback rather than `choco install`ing a pinned version:
      # a pinned install conflicts with the pre-installed package and fails the
      # job. Prefer the runner's LLVM (reproducible enough — it's part of the
      # pinned runner image); only `choco install` on a bare runner that lacks
      # it. A genuinely-missing libclang after both paths still fails loudly.
      - name: Set up libclang for whisper-rs-sys/bindgen
        if: steps.cargo.outputs.present == 'true'
        shell: pwsh
        run: |
          $llvmBin = "$env:ProgramFiles\LLVM\bin"
          if (-not (Test-Path (Join-Path $llvmBin 'libclang.dll'))) {
            Write-Host "libclang.dll not found at $llvmBin — installing LLVM via Chocolatey."
            # Bounded retry (#109): a `choco install` can fail transiently
            # (network blip, rate-limit, mirror hiccup). Retry a few times with
            # a short backoff before failing the job, so a flaky download on the
            # fallback path doesn't red a build that would otherwise pass. This
            # runs ONLY on a bare runner missing the pre-installed LLVM, so the
            # common (pre-installed) path is unaffected.
            $maxAttempts = 3
            for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
              choco install llvm -y --no-progress
              if ($LASTEXITCODE -eq 0) { break }
              if ($attempt -eq $maxAttempts) {
                Write-Error "choco install llvm failed with exit code $LASTEXITCODE after $maxAttempts attempts"
                exit 1
              }
              Write-Host "choco install llvm failed (attempt $attempt/$maxAttempts, exit $LASTEXITCODE) — retrying in 15s."
              Start-Sleep -Seconds 15
            }
          } else {
            Write-Host "Using pre-installed LLVM at $llvmBin (windows-latest image)."
          }
          if (-not (Test-Path (Join-Path $llvmBin 'libclang.dll'))) {
            Write-Error "libclang.dll is still missing at $llvmBin after setup — cannot build whisper-rs-sys."
            exit 1
          }
          "LIBCLANG_PATH=$llvmBin" >> $env:GITHUB_ENV
          Write-Host "LIBCLANG_PATH set to $llvmBin"

      - name: Ensure CMake is available
        if: steps.cargo.outputs.present == 'true'
        run: cmake --version

      - name: cargo build
        if: steps.cargo.outputs.present == 'true'
        working-directory: src-tauri
        run: cargo build --all-targets --all-features

      - name: cargo test
        if: steps.cargo.outputs.present == 'true'
        working-directory: src-tauri
        run: cargo test --all-features

      - name: Check for package.json
        id: pnpm
        shell: bash
        run: echo "present=$(test -f package.json && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        if: steps.pnpm.outputs.present == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'

      - name: Setup pnpm
        if: steps.pnpm.outputs.present == 'true'
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0 (commit SHA — the tag object SHA is not resolvable by Actions)

      - name: pnpm install
        if: steps.pnpm.outputs.present == 'true'
        run: pnpm install --frozen-lockfile

      - name: pnpm build (compile-check)
        if: steps.pnpm.outputs.present == 'true'
        run: pnpm build

      - name: No manifests present — nothing to compile yet
        if: steps.cargo.outputs.present == 'false' && steps.pnpm.outputs.present == 'false'
        shell: bash
        run: echo "Docs-only tree — no Cargo.toml or package.json yet. Skipping compile-check."

  docs-presence:
    name: docs-presence (warn-only)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check M1 docs are present
        run: |
          missing=0
          for f in README.md LICENSE CONTRIBUTING.md; do
            if [ ! -f "$f" ]; then
              echo "::warning::docs-presence: $f is missing (expected once M1 docs land)."
              missing=1
            fi
          done
          if [ "$missing" -eq 0 ]; then
            echo "All M1 docs present."
          fi
          exit 0
